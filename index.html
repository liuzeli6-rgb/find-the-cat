<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Find the Cat</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #24313d;
      --muted: #61717f;
      --paper: #fffdf7;
      --line: #dde4ea;
      --accent: #e95858;
      --accent-dark: #c83d3d;
      --leaf: #2f9d75;
      --sky: #68a8d7;
      --sun: #f2b84b;
      --shadow: 0 18px 50px rgba(36, 49, 61, .14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 16%, rgba(104, 168, 215, .24), transparent 28%),
        radial-gradient(circle at 88% 10%, rgba(242, 184, 75, .26), transparent 24%),
        linear-gradient(180deg, #f7fbff 0%, #fff8e8 100%);
      overflow-x: hidden;
    }

    button {
      font: inherit;
    }

    .app {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 32px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border: 2px solid rgba(36, 49, 61, .12);
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(36, 49, 61, .08);
      font-size: 28px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 52px);
      line-height: 1;
      letter-spacing: 0;
    }

    .tagline {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid rgba(36, 49, 61, .12);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(36, 49, 61, .08);
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(36, 49, 61, .12);
    }

    .btn.primary {
      border-color: transparent;
      background: var(--accent);
      color: white;
    }

    .btn.primary:hover {
      background: var(--accent-dark);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 310px;
      gap: 18px;
      align-items: start;
    }

    .scene-wrap,
    .panel {
      border: 1px solid rgba(36, 49, 61, .11);
      border-radius: 8px;
      background: rgba(255, 255, 255, .72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .scene-wrap {
      overflow: hidden;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .74);
    }

    .stat {
      min-width: 0;
      padding: 14px 16px;
      border-right: 1px solid var(--line);
    }

    .stat:last-child {
      border-right: 0;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .value {
      display: block;
      margin-top: 4px;
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .scene {
      position: relative;
      height: min(68vh, 650px);
      min-height: 430px;
      overflow: hidden;
      background:
        linear-gradient(#9ed4f0 0 50%, transparent 50%),
        linear-gradient(180deg, #8bcf78 0%, #5ead65 100%);
      cursor: crosshair;
      user-select: none;
      touch-action: manipulation;
    }

    .cloud,
    .tree,
    .bush,
    .rock,
    .box,
    .flower,
    .butterfly,
    .cat {
      position: absolute;
    }

    .cloud {
      width: var(--w);
      height: calc(var(--w) * .34);
      left: var(--x);
      top: var(--y);
      opacity: .8;
      border-radius: 999px;
      background: rgba(255, 255, 255, .9);
      box-shadow:
        calc(var(--w) * .18) calc(var(--w) * -.12) 0 calc(var(--w) * .03) rgba(255,255,255,.9),
        calc(var(--w) * .4) calc(var(--w) * .02) 0 calc(var(--w) * .04) rgba(255,255,255,.88);
      animation: drift var(--s) linear infinite;
    }

    @keyframes drift {
      from { transform: translateX(-16px); }
      to { transform: translateX(18px); }
    }

    .sun {
      position: absolute;
      right: 8%;
      top: 8%;
      width: 74px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--sun);
      box-shadow: 0 0 0 16px rgba(242, 184, 75, .18);
    }

    .tree {
      left: var(--x);
      bottom: var(--b);
      width: var(--w);
      height: calc(var(--w) * 1.65);
    }

    .tree::before {
      content: "";
      position: absolute;
      left: 42%;
      bottom: 0;
      width: 18%;
      height: 56%;
      border-radius: 999px 999px 3px 3px;
      background: #8a5a34;
    }

    .tree::after {
      content: "";
      position: absolute;
      left: 6%;
      top: 0;
      width: 88%;
      aspect-ratio: 1;
      border-radius: 48% 52% 45% 55%;
      background: #2f9d75;
      box-shadow:
        calc(var(--w) * -.12) calc(var(--w) * .2) 0 #247c5d,
        calc(var(--w) * .14) calc(var(--w) * .22) 0 #3dae7d;
    }

    .bush {
      left: var(--x);
      bottom: var(--b);
      width: var(--w);
      height: calc(var(--w) * .46);
      border-radius: 999px 999px 8px 8px;
      background: #347e57;
      box-shadow:
        calc(var(--w) * .22) calc(var(--w) * -.1) 0 calc(var(--w) * .04) #3f9969,
        calc(var(--w) * .48) calc(var(--w) * -.04) 0 #2f704f;
    }

    .rock {
      left: var(--x);
      bottom: var(--b);
      width: var(--w);
      height: calc(var(--w) * .52);
      border-radius: 50% 50% 12% 18%;
      background: #8a949b;
      box-shadow: inset -12px -8px 0 rgba(36, 49, 61, .12);
    }

    .box {
      left: var(--x);
      bottom: var(--b);
      width: var(--w);
      height: calc(var(--w) * .8);
      border-radius: 5px;
      background: #c88744;
      box-shadow: inset 0 10px 0 rgba(255,255,255,.12), inset -12px -8px 0 rgba(36,49,61,.1);
    }

    .box::before {
      content: "";
      position: absolute;
      inset: 12% 0 auto;
      height: 3px;
      background: rgba(36, 49, 61, .18);
    }

    .flower {
      left: var(--x);
      bottom: var(--b);
      width: 18px;
      height: 36px;
    }

    .flower::before {
      content: "";
      position: absolute;
      left: 8px;
      bottom: 0;
      width: 3px;
      height: 24px;
      background: #2f9d75;
    }

    .flower::after {
      content: "";
      position: absolute;
      left: 2px;
      top: 0;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow:
        -6px 3px 0 #f39b56,
        6px 3px 0 #f39b56,
        0 7px 0 #e95858;
    }

    .butterfly {
      left: var(--x);
      top: var(--y);
      width: 20px;
      height: 16px;
      animation: flutter 2.4s ease-in-out infinite;
    }

    .butterfly::before,
    .butterfly::after {
      content: "";
      position: absolute;
      top: 2px;
      width: 10px;
      height: 12px;
      border-radius: 10px 10px 5px 10px;
      background: #7054c6;
    }

    .butterfly::before {
      left: 0;
      transform: rotate(-24deg);
    }

    .butterfly::after {
      right: 0;
      transform: rotate(24deg);
    }

    @keyframes flutter {
      50% { transform: translateY(-12px); }
    }

    .cat {
      left: var(--cat-x);
      top: var(--cat-y);
      width: var(--cat-size);
      height: var(--cat-size);
      transform: translate(-50%, -50%) scale(var(--cat-scale, 1));
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      z-index: 6;
      transition: filter .2s ease, transform .2s ease;
    }

    .cat:hover {
      filter: drop-shadow(0 8px 10px rgba(36, 49, 61, .18));
      transform: translate(-50%, -50%) scale(calc(var(--cat-scale, 1) * 1.05));
    }

    .cat-body {
      position: absolute;
      left: 13%;
      top: 24%;
      width: 74%;
      height: 68%;
      border-radius: 45% 45% 38% 38%;
      background: #f9b35f;
      box-shadow: inset -8px -7px 0 rgba(147, 82, 35, .18);
    }

    .cat-body::before,
    .cat-body::after {
      content: "";
      position: absolute;
      top: -17%;
      width: 28%;
      height: 28%;
      background: #f9b35f;
      clip-path: polygon(50% 0, 0 100%, 100% 100%);
    }

    .cat-body::before {
      left: 10%;
      transform: rotate(-12deg);
    }

    .cat-body::after {
      right: 10%;
      transform: rotate(12deg);
    }

    .cat-face {
      position: absolute;
      inset: 34% 22% 24%;
    }

    .cat-face::before,
    .cat-face::after {
      content: "";
      position: absolute;
      top: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2f2520;
    }

    .cat-face::before { left: 12%; }
    .cat-face::after { right: 12%; }

    .nose {
      position: absolute;
      left: 50%;
      top: 38%;
      width: 8px;
      height: 6px;
      border-radius: 50%;
      background: #cf5b62;
      transform: translateX(-50%);
    }

    .tail {
      position: absolute;
      right: 1%;
      top: 46%;
      width: 30%;
      height: 16%;
      border: 8px solid #f9b35f;
      border-left: 0;
      border-bottom: 0;
      border-radius: 0 999px 0 0;
      transform: rotate(28deg);
      transform-origin: left bottom;
    }

    .hidden .cat {
      --cat-scale: .56;
    }

    .found .cat {
      animation: celebrate .72s ease-in-out infinite alternate;
    }

    @keyframes celebrate {
      to { transform: translate(-50%, -55%) rotate(-5deg) scale(1.1); }
    }

    .ripple {
      position: absolute;
      width: 32px;
      height: 32px;
      border: 3px solid rgba(233, 88, 88, .75);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: ping .55s ease-out forwards;
      z-index: 10;
    }

    @keyframes ping {
      to {
        width: 94px;
        height: 94px;
        opacity: 0;
      }
    }

    .panel {
      padding: 16px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .levels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .level {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }

    .level.active {
      border-color: var(--accent);
      background: #fff0ee;
      color: var(--accent-dark);
      font-weight: 800;
    }

    .message {
      min-height: 84px;
      padding: 14px;
      border: 1px dashed #cfd9e2;
      border-radius: 8px;
      background: #fbfdff;
      color: var(--muted);
      line-height: 1.65;
    }

    .records {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .record {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
    }

    .record strong {
      color: var(--leaf);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      max-width: min(420px, calc(100% - 28px));
      padding: 12px 16px;
      border-radius: 8px;
      background: rgba(36, 49, 61, .94);
      color: white;
      box-shadow: 0 18px 40px rgba(36, 49, 61, .18);
      transform: translate(-50%, 24px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 880px) {
      .topbar,
      .layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        width: 100%;
        justify-content: stretch;
      }

      .actions .btn {
        flex: 1;
      }

      .layout {
        display: block;
      }

      .panel {
        margin-top: 14px;
      }

      .scene {
        height: 58vh;
        min-height: 380px;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 18px, 1120px);
        padding-top: 14px;
      }

      .hud {
        grid-template-columns: repeat(2, 1fr);
      }

      .stat:nth-child(2) {
        border-right: 0;
      }

      .stat:nth-child(-n + 2) {
        border-bottom: 1px solid var(--line);
      }

      .scene {
        min-height: 340px;
      }

      .value {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">🐱</div>
        <div>
          <h1>Find the Cat</h1>
          <p class="tagline">在小院里找到藏起来的猫。越难，猫越小，也藏得越深。</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn primary" id="newGame">新一局</button>
        <button class="btn" id="hint">提示</button>
      </div>
    </header>

    <section class="layout">
      <div class="scene-wrap">
        <div class="hud" aria-label="游戏信息">
          <div class="stat">
            <span class="label">难度</span>
            <span class="value" id="levelName">普通</span>
          </div>
          <div class="stat">
            <span class="label">用时</span>
            <span class="value" id="time">0s</span>
          </div>
          <div class="stat">
            <span class="label">点击</span>
            <span class="value" id="clicks">0</span>
          </div>
          <div class="stat">
            <span class="label">最佳</span>
            <span class="value" id="best">--</span>
          </div>
        </div>
        <div class="scene hidden" id="scene" aria-label="找猫游戏区域"></div>
      </div>

      <aside class="panel">
        <h2>难度</h2>
        <div class="levels" id="levels">
          <button class="level" data-level="easy">简单</button>
          <button class="level active" data-level="normal">普通</button>
          <button class="level" data-level="hard">困难</button>
        </div>
        <div class="message" id="message">猫已经藏好了。点画面里的地方来找它，点错也会记录次数。</div>
        <div class="records" aria-label="最佳记录">
          <div class="record"><span>简单</span><strong id="recordEasy">--</strong></div>
          <div class="record"><span>普通</span><strong id="recordNormal">--</strong></div>
          <div class="record"><span>困难</span><strong id="recordHard">--</strong></div>
        </div>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const scene = document.querySelector("#scene");
    const timeEl = document.querySelector("#time");
    const clicksEl = document.querySelector("#clicks");
    const bestEl = document.querySelector("#best");
    const messageEl = document.querySelector("#message");
    const toastEl = document.querySelector("#toast");
    const levelNameEl = document.querySelector("#levelName");

    const records = {
      easy: document.querySelector("#recordEasy"),
      normal: document.querySelector("#recordNormal"),
      hard: document.querySelector("#recordHard")
    };

    const levels = {
      easy: { name: "简单", size: 74, clutter: 18, hint: 140 },
      normal: { name: "普通", size: 58, clutter: 28, hint: 105 },
      hard: { name: "困难", size: 42, clutter: 42, hint: 76 }
    };

    let currentLevel = "normal";
    let cat = { x: 50, y: 50 };
    let clicks = 0;
    let startedAt = 0;
    let timer = null;
    let found = false;

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function pick(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function setStyle(el, values) {
      Object.entries(values).forEach(([key, value]) => el.style.setProperty(key, value));
    }

    function formatScore(seconds, count) {
      return `${seconds}s / ${count}次`;
    }

    function getBest(level) {
      const raw = localStorage.getItem(`find-cat:${level}`);
      return raw ? JSON.parse(raw) : null;
    }

    function setBest(level, score) {
      const previous = getBest(level);
      if (!previous || score.seconds < previous.seconds || (score.seconds === previous.seconds && score.clicks < previous.clicks)) {
        localStorage.setItem(`find-cat:${level}`, JSON.stringify(score));
        return true;
      }
      return false;
    }

    function refreshRecords() {
      Object.keys(records).forEach((level) => {
        const best = getBest(level);
        records[level].textContent = best ? formatScore(best.seconds, best.clicks) : "--";
      });

      const currentBest = getBest(currentLevel);
      bestEl.textContent = currentBest ? `${currentBest.seconds}s` : "--";
    }

    function showToast(text) {
      toastEl.textContent = text;
      toastEl.classList.add("show");
      window.clearTimeout(showToast.hideTimer);
      showToast.hideTimer = window.setTimeout(() => toastEl.classList.remove("show"), 1800);
    }

    function addDecor() {
      scene.innerHTML = '<div class="sun"></div>';

      for (let i = 0; i < 4; i++) {
        const cloud = document.createElement("div");
        cloud.className = "cloud";
        setStyle(cloud, {
          "--x": `${rand(-4, 78)}%`,
          "--y": `${rand(7, 32)}%`,
          "--w": `${rand(70, 150)}px`,
          "--s": `${rand(5, 9)}s`
        });
        scene.append(cloud);
      }

      const config = levels[currentLevel];
      const types = ["tree", "bush", "rock", "box", "flower", "butterfly"];
      for (let i = 0; i < config.clutter; i++) {
        const type = pick(types);
        const el = document.createElement("div");
        el.className = type;

        if (type === "tree") {
          setStyle(el, { "--x": `${rand(0, 88)}%`, "--b": `${rand(3, 28)}%`, "--w": `${rand(54, 112)}px` });
        } else if (type === "bush") {
          setStyle(el, { "--x": `${rand(0, 86)}%`, "--b": `${rand(3, 32)}%`, "--w": `${rand(70, 150)}px` });
        } else if (type === "rock") {
          setStyle(el, { "--x": `${rand(2, 90)}%`, "--b": `${rand(2, 24)}%`, "--w": `${rand(38, 92)}px` });
        } else if (type === "box") {
          setStyle(el, { "--x": `${rand(4, 88)}%`, "--b": `${rand(2, 22)}%`, "--w": `${rand(44, 82)}px` });
        } else if (type === "flower") {
          setStyle(el, { "--x": `${rand(2, 96)}%`, "--b": `${rand(1, 26)}%` });
        } else {
          setStyle(el, { "--x": `${rand(4, 92)}%`, "--y": `${rand(22, 55)}%` });
        }

        scene.append(el);
      }
    }

    function addCat() {
      cat.x = rand(8, 92);
      cat.y = rand(49, 88);

      const button = document.createElement("button");
      button.className = "cat";
      button.type = "button";
      button.setAttribute("aria-label", "猫在这里");
      setStyle(button, {
        "--cat-x": `${cat.x}%`,
        "--cat-y": `${cat.y}%`,
        "--cat-size": `${levels[currentLevel].size}px`
      });
      button.innerHTML = `
        <span class="tail" aria-hidden="true"></span>
        <span class="cat-body" aria-hidden="true">
          <span class="cat-face"><span class="nose"></span></span>
        </span>
      `;
      button.addEventListener("click", (event) => {
        event.stopPropagation();
        win();
      });
      scene.append(button);
    }

    function startTimer() {
      window.clearInterval(timer);
      startedAt = Date.now();
      timer = window.setInterval(() => {
        timeEl.textContent = `${Math.floor((Date.now() - startedAt) / 1000)}s`;
      }, 250);
    }

    function startGame() {
      const config = levels[currentLevel];
      found = false;
      clicks = 0;
      clicksEl.textContent = "0";
      timeEl.textContent = "0s";
      levelNameEl.textContent = config.name;
      messageEl.textContent = "猫已经藏好了。点画面里的地方来找它，点错也会记录次数。";
      scene.classList.remove("found");
      scene.classList.add("hidden");
      addDecor();
      addCat();
      startTimer();
      refreshRecords();
    }

    function win() {
      if (found) return;
      found = true;
      clicks += 1;
      clicksEl.textContent = clicks;
      window.clearInterval(timer);
      scene.classList.remove("hidden");
      scene.classList.add("found");

      const seconds = Math.max(1, Math.floor((Date.now() - startedAt) / 1000));
      const isBest = setBest(currentLevel, { seconds, clicks });
      refreshRecords();
      messageEl.textContent = isBest
        ? `找到了！${seconds}秒，${clicks}次点击，新纪录。`
        : `找到了！${seconds}秒，${clicks}次点击。`;
      showToast(isBest ? "新纪录！" : "找到猫了！");
    }

    function markClick(event) {
      if (found) return;
      clicks += 1;
      clicksEl.textContent = clicks;

      const rect = scene.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const ripple = document.createElement("span");
      ripple.className = "ripple";
      ripple.style.left = `${x}px`;
      ripple.style.top = `${y}px`;
      scene.append(ripple);
      ripple.addEventListener("animationend", () => ripple.remove());

      const dx = ((x / rect.width) * 100) - cat.x;
      const dy = ((y / rect.height) * 100) - cat.y;
      const distance = Math.hypot(dx, dy);
      if (distance < 8) {
        messageEl.textContent = "很近了，再仔细看这附近。";
      } else if (distance < 18) {
        messageEl.textContent = "方向不错，猫就在周围。";
      } else {
        messageEl.textContent = "这里没有猫，换个地方看看。";
      }
    }

    function hint() {
      if (found) {
        showToast("已经找到啦，开新一局继续玩。");
        return;
      }

      const ring = document.createElement("span");
      ring.className = "ripple";
      ring.style.left = `${cat.x}%`;
      ring.style.top = `${cat.y}%`;
      ring.style.width = `${levels[currentLevel].hint}px`;
      ring.style.height = `${levels[currentLevel].hint}px`;
      scene.append(ring);
      ring.addEventListener("animationend", () => ring.remove());
      messageEl.textContent = "提示圈出现过的位置附近，藏着一只很淡定的猫。";
    }

    document.querySelector("#newGame").addEventListener("click", startGame);
    document.querySelector("#hint").addEventListener("click", hint);
    scene.addEventListener("click", markClick);

    document.querySelector("#levels").addEventListener("click", (event) => {
      const button = event.target.closest("[data-level]");
      if (!button) return;
      currentLevel = button.dataset.level;
      document.querySelectorAll(".level").forEach((item) => item.classList.toggle("active", item === button));
      startGame();
    });

    refreshRecords();
    startGame();
  </script>
</body>
</html>
